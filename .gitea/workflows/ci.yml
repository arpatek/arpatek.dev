name: Build and Push

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Gitea registry
        run: |
          echo "${{ secrets.REGISTRY_TOKEN }}" | docker login git.arpatek.dev \
            -u ${{ github.actor }} --password-stdin

      - name: Build and push
        run: |
          IMAGE=git.arpatek.dev/arpatek/arpatek.dev
          SHA=${{ github.sha }}

          docker build -t $IMAGE:$SHA -t $IMAGE:latest .

          docker push $IMAGE:$SHA
          docker push $IMAGE:latest

      - name: Rollout restart
        run: |
          curl -LO https://dl.k8s.io/release/v1.35.4/bin/linux/amd64/kubectl
          chmod +x kubectl && sudo mv kubectl /usr/local/bin/

          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

          kubectl rollout restart deployment/arpatek-dev
          kubectl rollout status deployment/arpatek-dev --timeout=120s
